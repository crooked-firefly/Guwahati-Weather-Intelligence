name: Auto Update Weather Data

on:
  push:
    paths:
      - 'data/guwahati_weather_1972_2025.csv'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn joblib

      - name: Run full pipeline
        run: |
          cd pipeline
          python run_pipeline.py

      - name: Commit updated files back to GitHub
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed_data.csv
          git add model_artifacts/
          git diff --staged --quiet || git commit -m "Auto update: data + model retrained [$(date +'%Y-%m-%d')]"
          git push